<!DOCTYPE html>
<html>
<head>
    <title>T-Test Calculator</title>
</head>

<body>

<h2>One Sample T-Test Calculator</h2>

<form method="POST">

    <label>Enter Data (comma separated)</label><br>
    <input type="text" name="data" placeholder="12,15,18,20" required>
    <br><br>

    <label>Null Hypothesis Mean (μ0)</label><br>
    <input type="number" step="any" name="mu0" required>
    <br><br>

    <button type="submit">Calculate</button>

</form>

{% if result %}

<h3>Results</h3>

<p>Mean: {{ result.mean }}</p>
<p>Standard Deviation: {{ result.std_dev }}</p>
<p>T Score: {{ result.t_score }}</p>
<p>P Value: {{ result.p_value }}</p>
<p><b>{{ result.decision }}</b></p>

{% endif %}

</body>
</html>
