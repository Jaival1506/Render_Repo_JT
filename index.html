<!DOCTYPE html>
<html>
<head>
<title>Database Input</title>
</head>

<body>

<h2>Enter Data</h2>

<form method="POST">

Name:
<input type="text" name="name">

Value:
<input type="number" step="0.01" name="value">

<button type="submit">Submit</button>

</form>

<h2>Stored Data</h2>

<ul>

{% for d in data %}
<li>{{d.name}} : {{d.value}}</li>
{% endfor %}

</ul>

</body>
</html>
